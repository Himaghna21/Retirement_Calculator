<?xml version="1.0" encoding="UTF-8"?>
<svg 
  xmlns="http://www.w3.org/2000/svg" 
  viewBox="0 0 1200 300" 
  width="1200" 
  height="300"
  aria-label="Retirement Planning Calculator Banner"
  role="img"
>
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#224c87;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a66;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="300" fill="url(#bgGradient)"/>
  
  <!-- Decorative Shapes -->
  <circle cx="100" cy="50" r="40" fill="#da3832" opacity="0.1"/>
  <circle cx="1100" cy="250" r="60" fill="#ffffff" opacity="0.05"/>
  <rect x="500" y="20" width="200" height="200" fill="#919090" opacity="0.05" rx="10"/>
  
  <!-- Main Title -->
  <text 
    x="600" 
    y="100" 
    font-family="Montserrat, Arial, sans-serif" 
    font-size="48" 
    font-weight="bold" 
    fill="#ffffff" 
    text-anchor="middle"
  >Retirement Planning</text>
  
  <!-- Subtitle -->
  <text 
    x="600" 
    y="160" 
    font-family="Montserrat, Arial, sans-serif" 
    font-size="28" 
    fill="#ffffff" 
    text-anchor="middle"
  >Calculator</text>
  
  <!-- Tagline -->
  <text 
    x="600" 
    y="220" 
    font-family="Arial, sans-serif" 
    font-size="16" 
    fill="#ffffff" 
    opacity="0.9"
    text-anchor="middle"
  >Plan your financial future with confidence</text>
  
  <!-- Accent Line -->
  <line x1="400" y1="240" x2="800" y2="240" stroke="#da3832" stroke-width="3"/>
  
  <desc>Retirement Planning Calculator banner image</desc>
</svg>