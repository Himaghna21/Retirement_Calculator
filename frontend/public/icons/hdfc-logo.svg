<?xml version="1.0" encoding="UTF-8"?>
<svg 
  xmlns="http://www.w3.org/2000/svg" 
  viewBox="0 0 120 50" 
  width="120" 
  height="50"
  aria-label="HDFC Logo"
  role="img"
>
  <!-- Background -->
  <rect width="120" height="50" fill="#ffffff" rx="3"/>
  
  <!-- Blue Square -->
  <rect x="5" y="5" width="40" height="40" fill="#224c87" rx="2"/>
  
  <!-- "HD" Text -->
  <text 
    x="25" 
    y="32" 
    font-family="Montserrat, Arial, sans-serif" 
    font-size="20" 
    font-weight="bold" 
    fill="#ffffff" 
    text-anchor="middle"
    dominant-baseline="middle"
  >HD</text>
  
  <!-- HDFC Text -->
  <text 
    x="70" 
    y="18" 
    font-family="Montserrat, Arial, sans-serif" 
    font-size="11" 
    font-weight="bold" 
    fill="#224c87"
  >HDFC</text>
  
  <!-- Subtitle -->
  <text 
    x="70" 
    y="34" 
    font-family="Arial, sans-serif" 
    font-size="7" 
    fill="#919090"
  >Retirement</text>
  
  <desc>HDFC Retirement Planning Calculator</desc>
</svg>